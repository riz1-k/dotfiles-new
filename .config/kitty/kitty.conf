# Font
font_family Cascadia Code
font_size 12
adjust_line_height 120%

# Window
window_padding_width 9
hide_window_decorations yes

# Cursor
cursor_shape block
cursor_blink_interval 0

# Terminal Behavior
shell /bin/zsh
scrollback_lines 10000

# Mouse
mouse_hide_wait 0

# Visual
background_opacity 0.95
bold_is_bright yes

cursor_trail 1

# Font Features
font_features CascadiaCode +calt -liga

# Keybindings
map ctrl+shift+e launch --location vsplit
map ctrl+shift+r load_config_file

enable_audio_bell no
