# Ayu Dark Tmux Configuration

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g base-index 1
setw -g pane-base-index 1

set-option -g prefix C-a
unbind %

bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

bind v copy-mode
bind r source-file ~/.tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind-key C-b set-option -g status
bind -r m resize-pane -Z

set -g mouse on

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

bind-key -r f run-shell "tmux neww ~/scripts/tmux-sessionizer"
bind-key n command-prompt "new-session -s '%%'"

unbind -T copy-mode-vi MouseDragEnd1Pane

set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/.tmux/plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"

set -g @sessionx-bind 'o'

# Ayu Dark Theme Colors
ayu_dark_bg="#0B0E14"
ayu_dark_fg="#C5C5C5"
ayu_dark_orange="#FF8F40"
ayu_dark_blue="#55B4D4"
ayu_dark_green="#AAD94C"
ayu_dark_red="#F07178"

# Modern Status bar at bottom left with rich UI
set -g status-position bottom
set -g status-justify "left"
set -g status-left-length 120
set -g status-right-length 80

set -g status-style "bg=${ayu_dark_bg},fg=${ayu_dark_fg}"
set -g status-interval 1

set -g status-left "#[bg=${ayu_dark_orange},fg=${ayu_dark_bg},bold]  #S #[bg=${ayu_dark_bg},fg=${ayu_dark_orange}]▓▒░"
set -g status-right "#[bg=${ayu_dark_bg},fg=${ayu_dark_orange}]░▒▓ #{?#{e|>=:10,#{battery_percentage}},#{#[fg=${ayu_dark_red}]🔋 #{battery_percentage}},#{#[fg=${ayu_dark_green}]🔋 #{battery_percentage}}} #[bg=${ayu_dark_bg},fg=${ayu_dark_orange}]░▒▓ #{?#{==:#{online_status},ok},#{#[fg=${ayu_dark_green}]🌐 online},#{#[fg=${ayu_dark_red}]🌐 offline}} #[bg=${ayu_dark_bg},fg=${ayu_dark_orange}]░▒▓ %H:%M %d-%b-%y "

set -g window-status-format "#[bg=${ayu_dark_bg},fg=${ayu_dark_fg}]  #{window_index}:#{window_name} "
set -g window-status-style "bg=${ayu_dark_bg},fg=${ayu_dark_fg}"
set -g window-status-activity-style "bg=${ayu_dark_orange},fg=${ayu_dark_bg},bold"
set -g window-status-bell-style "bg=${ayu_dark_red},fg=${ayu_dark_bg},bold"
set -g window-status-separator " #[bg=${ayu_dark_bg},fg=${ayu_dark_orange}]│ "

set -g window-status-current-format "#[bg=${ayu_dark_orange},fg=${ayu_dark_bg},bold]  #{window_index}:#{window_name} "
set -g window-status-current-style "bg=${ayu_dark_orange},fg=${ayu_dark_bg},bold"

set -g window-status-separator ""

set -g @online_icon "ok"
set -g @offline_icon "nok"

set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore "on"

run '~/.tmux/plugins/tpm/tpm'
